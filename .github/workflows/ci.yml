name: CI

on: 
  push:
    branches: [ '**' ]

permissions:
  contents: read

# ----------------- #
# CI Python version #
# ----------------- #
# In the GitHub CI pipeline, all jobs are run for each Python version located in
# the repo variable named CI_PYTHON_VERSIONS. Edit this in GitHub under
# Settings -> Secrets and Variables -> Variables (Tab) -> Repository variables
#   CI_PYTHON_VERSIONS = ["3.12", "3.13"]  

jobs:
  typecheck:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(vars.CI_PYTHON_VERSIONS) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run ruff
        run: uv run ruff format --check .
      - name: Run Pyright
        run: uv run pyright .

